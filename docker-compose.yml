# =============================================================================
# LangChain SQLAgent service (Langflow-compatible)
# =============================================================================

name: ai-agents

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-agents:0.3.0
    container_name: ai-agents
    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_NAME: ${APP_NAME:-ai-agents}
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1}
      DATABASE_URL: ${DATABASE_URL:-}
      SQL_AGENT_MAX_ITERATIONS: ${SQL_AGENT_MAX_ITERATIONS:-15}
      SQL_AGENT_MAX_RETRIES: ${SQL_AGENT_MAX_RETRIES:-3}
      SQL_AGENT_VERBOSE: ${SQL_AGENT_VERBOSE:-true}
      SQL_AGENT_HANDLE_PARSING_ERRORS: ${SQL_AGENT_HANDLE_PARSING_ERRORS:-true}
      SYSTEM_PROMPT_PATH: /app/prompts/sql_agent_system.md
      HERMES_HOME: /home/appuser/.hermes
      HERMES_ENABLE_PROJECT_PLUGINS: "true"
      HERMES_ENABLED_TOOLSETS: ${HERMES_ENABLED_TOOLSETS:-sql_bridge}
      HERMES_SYSTEM_PROMPT_PATH: /app/prompts/hermes_coordinator.md
      HERMES_MAX_ITERATIONS: ${HERMES_MAX_ITERATIONS:-12}
      HERMES_SESSION_HISTORY_LIMIT: ${HERMES_SESSION_HISTORY_LIMIT:-20}
      HERMES_SKIP_MEMORY: ${HERMES_SKIP_MEMORY:-false}
      HERMES_REASONING_ENABLED: ${HERMES_REASONING_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      HEALTHCHECK_URL: http://127.0.0.1:8080/health

    ports:
      - "${APP_PORT:-8080}:8080"

    volumes:
      - ./logs:/app/logs:rw
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./plugins:/app/plugins:ro

    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true

networks:
  default:
    name: ai-agents-net
