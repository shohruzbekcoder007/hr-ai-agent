# HR Agent runtime configuration (non-secret settings)
# Secrets belong in .env — never put API keys here.

agent:
  name: hr-ai-agent
  domain: human_resources_sql
  description: >
    PostgreSQL SQL agent that answers workforce questions exclusively
    via read-only SQL tools (list_tables, describe_table, run_sql).

  model: ${HR_MODEL:-anthropic/claude-sonnet-4.6}
  max_iterations: 30
  quiet_mode: true
  skip_memory: true
  skip_context_files: true
  enabled_toolsets:
    - sql

  system_prompt_path: ${SYSTEM_PROMPT_PATH:-/app/prompts/system_prompt.md}
  database_url_env: DATABASE_URL

  response:
    default_format: natural_language
    allow_json: true
    allow_markdown_table: true
    refuse_out_of_domain: false
    never_hallucinate: true
    no_data_message: "No matching data exists"

  sql:
    read_only: true
    max_rows: 200
    statement_timeout_ms: 30000

api:
  host: ${APP_HOST:-0.0.0.0}
  port: ${APP_PORT:-8080}
  cors_origins: ${CORS_ORIGINS:-*}
  session_history_limit: ${HR_SESSION_HISTORY_LIMIT:-20}
