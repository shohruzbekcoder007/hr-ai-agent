# Logging reference (actual setup is app/logging_setup.py + env)
version: 1
disable_existing_loggers: false

formatters:
  plain:
    format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: plain
    stream: ext://sys.stdout

loggers:
  app:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
