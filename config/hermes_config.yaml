# Hermes Agent Framework configuration for the HR production container.
# Placed into $HERMES_HOME/config.yaml at container start.
#
# Rule: secrets stay in .env. Behavioral settings live here.

_config_version: 21

model:
  # Overridden at runtime by HR_MODEL / provider env vars when set.
  # For direct OpenAI set OPENAI_API_KEY + HR_MODEL=gpt-4o-mini (see .env.example).
  # Library embedding also passes api_key + base_url from agents/hr_agent.py.
  default: ""
  # provider is left empty; hr_agent resolves OpenAI/OpenRouter/Anthropic from env.

agent:
  max_iterations: 20

terminal:
  backend: local
  cwd: /app
  timeout: 60

display:
  skin: default

memory:
  # HR agent is intentionally stateless across restarts (JSON is source of truth)
  provider: ""

plugins:
  enabled:
    - hr-employee
  disabled: []

tools:
  cli:
    enabled:
      - hr
    disabled:
      - terminal
      - browser
      - web
      - code_execution
      - delegation
      - cronjob
      - image_gen
      - vision

logging:
  level: INFO

security:
  # Production HR agent: no shell / browser by default
  allow_dangerous_tools: false

gateway:
  # Messaging gateway is optional; HTTP API is the primary interface
  enabled: false
